name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install MoonBit Toolchain
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix_install.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Code Check (Strict - Deny Warnings)
        run: |
          export PATH="$HOME/.moon/bin:$PATH"
          moon check --deny-warn

      - name: Interface Info Check
        run: |
          export PATH="$HOME/.moon/bin:$PATH"
          moon info --deny-warn

      - name: Run Unit Tests
        run: |
          export PATH="$HOME/.moon/bin:$PATH"
          moon test

      - name: Run Demo Application
        run: |
          export PATH="$HOME/.moon/bin:$PATH"
          moon run cmd/main
